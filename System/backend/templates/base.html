<!-- base.html -->

<!DOCTYPE html>
<html>

<head>

    <title>{{ page_title }}</title>

    <style>

        /* =====================================
           Global Styles
        ====================================== */

        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #111827;
            color: white;
        }

        /* =====================================
           Header
        ====================================== */

        .header {
            background: #1f2937;
            padding: 20px;
            font-size: 28px;
            font-weight: bold;
        }

        /* =====================================
           Main Layout
        ====================================== */

        .container {
            display: flex;
            min-height: 100vh;
        }

        /* =====================================
           Sidebar Navigation
        ====================================== */

        .sidebar {
            width: 250px;
            background: #1f2937;
            padding: 20px;
        }

        .sidebar a {
            display: block;
            color: white;
            text-decoration: none;
            padding: 12px 0;
        }

        .sidebar a:hover {
            color: #60a5fa;
        }

        /* =====================================
           Main Content Area
        ====================================== */

        .content {
            flex: 1;
            padding: 30px;
        }

        /* =====================================
           Generic Card Style
        ====================================== */

        .card {
            background: #1f2937;
            border-radius: 10px;
            padding: 20px;
        }

    </style>

</head>

<body>

    <!-- Header -->

    <div class="header">
        CarCodex
    </div>

    <!-- Main Layout -->

    <div class="container">

        <!-- Sidebar -->

        <div class="sidebar">

            <a href="/ui">
                🏠 Dashboard
            </a>

            <a href="/vehicles-ui">
                🚗 Vehicles
            </a>

            <a href="#">
                🔧 Maintenance
            </a>

            <a href="#">
                🏢 Vendors
            </a>

            <a href="#">
                📄 Documents
            </a>

        </div>

        <!-- Page Specific Content -->

        <div class="content">

            {% block content %}
            {% endblock %}

        </div>

    </div>

</body>

</html>
