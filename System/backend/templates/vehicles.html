{% extends "base.html" %}

{% block content %}

<h1>Vehicles</h1>

<p>
    <a href="/ui" class="nav-link">
        ← Back to Dashboard
    </a>
</p>

<div class="vehicle-grid">

    {% for vehicle in vehicles %}

    <a href="/vehicle/{{ vehicle.id }}" class="vehicle-link">

        <div class="vehicle-card">

            <h2>{{ vehicle.nickname }}</h2>

            <p>
                {{ vehicle.year }}
                {{ vehicle.make }}
                {{ vehicle.model }}
            </p>

            <p>
                Mileage: {{ vehicle.current_mileage }}
            </p>

        </div>

    </a>

    {% endfor %}

</div>

<style>

    .vehicle-grid {
        display: flex;
        gap: 20px;
        flex-wrap: wrap;
    }

    .vehicle-link {
        text-decoration: none;
        color: inherit;
    }

    .vehicle-card {
        background: #1f2937;
        border: 1px solid #374151;
        border-radius: 10px;
        width: 300px;
        padding: 20px;
        transition: all 0.2s ease;
    }

    .vehicle-card:hover {
        background: #374151;
        transform: translateY(-3px);
        cursor: pointer;
    }

    .nav-link {
        color: #60a5fa;
        text-decoration: none;
    }

    .nav-link:hover {
        text-decoration: underline;
    }

</style>

{% endblock %}
